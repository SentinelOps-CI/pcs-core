name: PF-Core Release Gate

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  certifyedge-release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pcs-core
        run: |
          cd python
          pip install -e .
      - name: CertifyEdge mock path (always)
        run: |
          cd python
          export PF_CORE_CERTIFYEDGE_MODE=mock
          pcs pf-core certifyedge-check \
            --trace ../examples/pf-core-valid/certifyedge_mock/trace.json \
            --property qc_release.temporal.safety \
            --out /tmp/PFCoreCertificate.certifyedge.mock.json
          test -f /tmp/PFCoreCertificate.certifyedge.mock.json
          pcs validate /tmp/PFCoreCertificate.certifyedge.mock.json
          echo "OK CertifyEdge mock path validated (not a live release attestation)"
      - name: CertifyEdge live path (when CLI available)
        env:
          PF_CORE_CERTIFYEDGE_CLI: ${{ secrets.PF_CORE_CERTIFYEDGE_CLI }}
          PF_CORE_CERTIFYEDGE_REQUIRE_LIVE: ${{ vars.PF_CORE_CERTIFYEDGE_REQUIRE_LIVE || '0' }}
        run: |
          cd python
          CLI="${PF_CORE_CERTIFYEDGE_CLI:-}"
          REQUIRE_LIVE="${PF_CORE_CERTIFYEDGE_REQUIRE_LIVE:-0}"
          if [ -n "${CLI}" ] && [ -f "${CLI}" ]; then
            echo "Using PF_CORE_CERTIFYEDGE_CLI=${CLI}"
          elif command -v certifyedge >/dev/null 2>&1; then
            CLI="$(command -v certifyedge)"
            echo "Using certifyedge on PATH: ${CLI}"
          elif [ -f ../scripts/certifyedge-stub.py ]; then
            CLI="$(python3 -c 'import os; print(os.path.realpath("../scripts/certifyedge-stub.py"))')"
            chmod +x "${CLI}" || true
            echo "Using CertifyEdge format stub: ${CLI}"
          else
            if [ "${REQUIRE_LIVE}" = "1" ] || [ "${REQUIRE_LIVE}" = "true" ]; then
              echo "FAIL: PF_CORE_CERTIFYEDGE_REQUIRE_LIVE=1 but no CertifyEdge CLI or stub."
              echo "  Set repository secret PF_CORE_CERTIFYEDGE_CLI or install certifyedge."
              exit 1
            fi
            echo "SKIP: CertifyEdge live attestation unavailable."
            echo "  Set PF_CORE_CERTIFYEDGE_REQUIRE_LIVE=1 to fail closed on missing CLI."
            echo "  Mock path validated above; release attestation not claimed live."
            exit 0
          fi
          export PF_CORE_CERTIFYEDGE_CLI="${CLI}"
          export PF_CORE_CERTIFYEDGE_MODE=live
          ${CLI} --version || true
          pcs pf-core certifyedge-check \
            --require-live \
            --trace ../examples/pf-core-valid/labtrust_replay/trace.json \
            --property qc_release.temporal.safety \
            --out /tmp/PFCoreCertificate.certifyedge.release.json
          test -f /tmp/PFCoreCertificate.certifyedge.release.json
          pcs validate /tmp/PFCoreCertificate.certifyedge.release.json
          echo "OK CertifyEdge live attestation succeeded"
