name: Release provenance

# PR15 / B8: GitHub artifact attestations (SLSA provenance + SBOM) for release
# subjects. Binds source commit, workflow/builder identity, lockfiles, verifier
# image digest, wheel digests, SBOM digest, and PF-Core bundle root when present.
#
# Fail-closed honesty: when attestations cannot be created (private repo without
# GHEC, missing permissions, OIDC), status=gated with an explicit notice. Tag /
# require-signed runs fail unless vars.PCS_PROVENANCE_ALLOW_GATED=true.
#
# Mandatory CI matrix: PR CI runs digest-binding + consumer verify in ci.yml
# `provenance-verification` (signed attestations remain org-gated). This workflow
# is the standalone produce + clean-consumer path for tags / workflow_dispatch.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      require_signed:
        description: "Fail if signed GitHub attestations cannot be created/verified"
        required: true
        default: false
        type: boolean
      allow_gated:
        description: "Permit gated (unsigned) digest binding for this run"
        required: true
        default: true
        type: boolean
      build_pf_core_bundle:
        description: "Install elan and assemble a PF-Core release bundle for root digest"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write
  attestations: write
  actions: read

jobs:
  produce-and-attest:
    runs-on: ubuntu-latest
    outputs:
      attestation_status: ${{ steps.finalize.outputs.status }}
      artifact_name: pcs-core-release-provenance
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Resolve require-signed policy
        id: policy
        run: |
          REQUIRE=false
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            REQUIRE=true
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.require_signed }}" = "true" ]; then
            REQUIRE=true
          fi
          if [ "${{ vars.PCS_PROVENANCE_ALLOW_GATED }}" = "true" ] || [ "${{ inputs.allow_gated }}" = "true" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.require_signed }}" != "true" ]; then
              REQUIRE=false
            fi
            if [ "${{ vars.PCS_PROVENANCE_ALLOW_GATED }}" = "true" ]; then
              echo "NOTE: vars.PCS_PROVENANCE_ALLOW_GATED=true (org still enabling attestations)"
              REQUIRE=false
            fi
          fi
          echo "require_signed=${REQUIRE}" >> "$GITHUB_OUTPUT"
          echo "PCS_PROVENANCE_REQUIRE_SIGNED=$([ "${REQUIRE}" = "true" ] && echo 1 || echo 0)" >> "$GITHUB_ENV"
          echo "Resolved require_signed=${REQUIRE}"

      - name: Install Python package (for schema validate + optional bundle)
        run: |
          cd python
          pip install -c requirements.lock -e ".[dev]"
          pip install build

      - name: Optional PF-Core release bundle (bundle root digest)
        if: ${{ github.event_name == 'push' || inputs.build_pf_core_bundle == true }}
        run: |
          set -euo pipefail
          bash scripts/install-elan-verified.sh
          export PATH="$HOME/.elan/bin:$PATH"
          cd lean
          lake build PFCore
          cd ../python
          pcs pf-core lean-check \
            --trace ../examples/pf-core-valid/tool_use_trace_compiled/pfcore_trace.json \
            --out /tmp/pfcore-provenance-cert.json \
            --result-out /tmp/pfcore-provenance-lean-check.json
          mkdir -p ../dist/release-bundle
          pcs pf-core bundle-release \
            --trace ../examples/pf-core-valid/tool_use_trace_compiled/pfcore_trace.json \
            --cert /tmp/pfcore-provenance-cert.json \
            --lean-check-result /tmp/pfcore-provenance-lean-check.json \
            --out ../dist/release-bundle
          pcs pf-core validate-bundle ../dist/release-bundle
          echo "PCS_PROVENANCE_BUNDLE_DIR=${GITHUB_WORKSPACE}/dist/release-bundle" >> "$GITHUB_ENV"

      - name: Build provenance subjects + binding
        run: |
          bash scripts/build-release-provenance.sh dist/provenance
          test -f dist/provenance/ReleaseProvenanceBinding.v0.json
          test -f dist/provenance/subjects-attest.sha256
          python3 - <<'PY'
          import json
          from pathlib import Path
          from pcs_core.validate import validate_artifact
          binding = json.loads(Path("dist/provenance/ReleaseProvenanceBinding.v0.json").read_text(encoding="utf-8"))
          # pending attestation is schema-valid
          validate_artifact(binding, "ReleaseProvenanceBinding.v0", release_grade=False)
          print("OK binding schema (pending)")
          PY

      - name: Attest build provenance (immutable subjects)
        id: attest_prov
        continue-on-error: true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-checksums: dist/provenance/subjects-attest.sha256

      - name: Attest SBOM
        id: attest_sbom
        continue-on-error: true
        uses: actions/attest-sbom@115c3be05ff3974bcbd596578934b3f9ce39bf68 # v2.2.0
        with:
          subject-path: dist/provenance/sbom/pcs-core.cdx.json
          sbom-path: dist/provenance/sbom/pcs-core.cdx.json

      - name: Finalize attestation status (signed or gated)
        id: finalize
        run: |
          set -euo pipefail
          PROV_OK="${{ steps.attest_prov.outcome }}"
          SBOM_OK="${{ steps.attest_sbom.outcome }}"
          IDS="${{ steps.attest_prov.outputs.attestation-id }}"
          URLS="${{ steps.attest_prov.outputs.attestation-url }}"
          if [ -n "${{ steps.attest_sbom.outputs.attestation-id }}" ]; then
            if [ -n "${IDS}" ]; then IDS="${IDS},"; fi
            IDS="${IDS}${{ steps.attest_sbom.outputs.attestation-id }}"
          fi
          if [ -n "${{ steps.attest_sbom.outputs.attestation-url }}" ]; then
            if [ -n "${URLS}" ]; then URLS="${URLS},"; fi
            URLS="${URLS}${{ steps.attest_sbom.outputs.attestation-url }}"
          fi

          if [ "${PROV_OK}" = "success" ]; then
            bash scripts/finalize-provenance-attestation.sh dist/provenance signed "" "${IDS}" "${URLS}"
          else
            REASON="actions/attest-build-provenance failed (outcome=${PROV_OK}; sbom_outcome=${SBOM_OK}). "
            REASON+="Common causes: private repository without GitHub Enterprise Cloud, "
            REASON+="missing id-token/attestations permissions, or org policy blocking Sigstore OIDC."
            bash scripts/finalize-provenance-attestation.sh dist/provenance gated "${REASON}" "" ""
          fi

          STATUS="$(python3 -c "import json; print(json.load(open('dist/provenance/ReleaseProvenanceBinding.v0.json'))['attestation']['status'])")"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.policy.outputs.require_signed }}" = "true" ] && [ "${STATUS}" != "signed" ]; then
            echo "FAIL: signed provenance required but status=${STATUS}"
            echo "Set repository variable PCS_PROVENANCE_ALLOW_GATED=true only while org attestation setup is incomplete."
            exit 1
          fi

      - name: Attest sealed binding
        id: attest_binding
        if: ${{ steps.finalize.outputs.status == 'signed' }}
        continue-on-error: true
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: dist/provenance/ReleaseProvenanceBinding.v0.json

      - name: Upload provenance package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pcs-core-release-provenance
          path: dist/provenance
          retention-days: 90
          include-hidden-files: false

  consumer-verify:
    name: Consumer provenance verify
    needs: produce-and-attest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
      actions: read
    steps:
      - name: Checkout scripts only (verification helpers)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            scripts
            python
            schemas
            catalog
            pins
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install validator (schema check only)
        run: |
          cd python
          pip install -c requirements.lock -e "."

      - name: Download provenance package (no producer tree reuse)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pcs-core-release-provenance
          path: /tmp/pcs-provenance-dl

      - name: Verify provenance as clean consumer
        env:
          GH_TOKEN: ${{ github.token }}
          PCS_PROVENANCE_REQUIRE_SIGNED: ${{ needs.produce-and-attest.outputs.attestation_status == 'signed' && '1' || '0' }}
        run: |
          # upload-artifact may nest under dist/provenance; normalize to a flat package dir.
          if [ -f /tmp/pcs-provenance-dl/ReleaseProvenanceBinding.v0.json ]; then
            PKG=/tmp/pcs-provenance-dl
          elif [ -f /tmp/pcs-provenance-dl/provenance/ReleaseProvenanceBinding.v0.json ]; then
            PKG=/tmp/pcs-provenance-dl/provenance
          elif [ -f /tmp/pcs-provenance-dl/dist/provenance/ReleaseProvenanceBinding.v0.json ]; then
            PKG=/tmp/pcs-provenance-dl/dist/provenance
          else
            echo "FAIL: could not locate ReleaseProvenanceBinding.v0.json in artifact" >&2
            find /tmp/pcs-provenance-dl -maxdepth 4 -type f | head -n 50
            exit 1
          fi
          test ! -d "${GITHUB_WORKSPACE}/dist/provenance" || echo "NOTE: checkout may contain scripts only"
          bash scripts/verify-release-provenance.sh "${PKG}"
          test -f "${PKG}/consumer-verification-result.json"
          python3 - <<PY
          import json
          from pathlib import Path
          r = json.loads(Path(r"${PKG}/consumer-verification-result.json").read_text(encoding="utf-8"))
          assert r["ok"] is True
          print("OK consumer-verification-result", r["attestation_status"])
          PY
