name: Release provenance

# SLSA / SBOM scaffolding for version tags. Full SLSA Build L3 generators require
# org trust setup; this workflow emits SBOM + a provenance statement stub.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  provenance-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Generate SBOM scaffold
        run: |
          bash scripts/generate-sbom.sh dist/sbom
          test -f dist/sbom/pcs-core.cdx.json
      - name: Write provenance statement stub
        run: |
          mkdir -p dist/provenance
          python3 - <<'PY'
          import json, os, pathlib, datetime
          root = pathlib.Path("dist/provenance")
          version = pathlib.Path("VERSION").read_text(encoding="utf-8").strip()
          statement = {
              "_type": "https://in-toto.io/Statement/v1",
              "subject": [{"name": "pcs-core", "digest": {"gitCommit": os.environ.get("GITHUB_SHA", "")}}],
              "predicateType": "https://slsa.dev/provenance/v1",
              "predicate": {
                  "buildDefinition": {
                      "buildType": "https://github.com/SentinelOps-CI/pcs-core/docs/security-governance.md#slsa-scaffold",
                      "externalParameters": {
                          "ref": os.environ.get("GITHUB_REF", ""),
                          "version": version,
                      },
                  },
                  "runDetails": {
                      "builder": {"id": "https://github.com/SentinelOps-CI/pcs-core/.github/workflows/release-provenance.yml"},
                      "metadata": {
                          "invocationId": os.environ.get("GITHUB_RUN_ID", ""),
                          "startedOn": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
                      },
                  },
                  "notes": [
                      "Scaffold only: replace with official SLSA generator when org permissions allow.",
                      "Pair with SBOM at dist/sbom/pcs-core.cdx.json and OCI digests when published.",
                  ],
              },
          }
          out = root / "provenance.slsa.json"
          out.write_text(json.dumps(statement, indent=2) + "\n", encoding="utf-8")
          print(f"OK wrote {out}")
          PY
      - name: Upload SBOM and provenance artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pcs-core-sbom-provenance
          path: |
            dist/sbom/
            dist/provenance/
          retention-days: 90
