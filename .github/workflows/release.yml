name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches VERSION
        run: |
          expected="v$(tr -d '\r\n' < VERSION)"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION file (${expected})"
            exit 1
          fi
      - name: Full conformance gate
        run: |
          cd python
          pip install -e ".[dev]"
          pytest -q
          pcs examples check
          python -m pcs_core.hash_vectors --verify
          bash ../scripts/pcs-schema-diff.sh ../schemas
