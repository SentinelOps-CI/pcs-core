name: Release

# Unified release / technical-preview gate. Does not push tags.
# PCS_RELEASE_MODE=release requires live external attestation + pinned CertifyEdge.
# PCS_RELEASE_MODE=preview allows absence notice with explicit disclosure.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_mode:
        description: "release (live attestation required) or preview (absence notice allowed)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - release

permissions:
  contents: read

jobs:
  unified-release-gate:
    runs-on: ubuntu-latest
    env:
      PCS_RELEASE_MODE: ${{ github.event.inputs.release_mode || 'release' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@4d407b29186a635f0cc27475ef0bc0ae605a8866 # 1.86
        with:
          components: rustfmt, clippy
      - name: Resolve release mode
        run: |
          MODE="${PCS_RELEASE_MODE:-release}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.release_mode }}"
          fi
          echo "PCS_RELEASE_MODE=${MODE}" >> "$GITHUB_ENV"
          echo "Resolved PCS_RELEASE_MODE=${MODE}"
      - name: Verify tag matches VERSION (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v$(tr -d '\r\n' < VERSION)"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION file (${expected})"
            exit 1
          fi
      - name: Install elan (checksum verified)
        run: bash scripts/install-elan-verified.sh
      - name: Verify CertifyEdge pin (fail-closed in release)
        run: python3 scripts/verify-certifyedge-pin.py --mode "${PCS_RELEASE_MODE}"
      - name: Provision CertifyEdge from pin
        run: |
          set +e
          bash scripts/provision-certifyedge.sh
          status=$?
          set -e
          if [ "${PCS_RELEASE_MODE}" = "release" ] && [ "${status}" -ne 0 ]; then
            echo "FAIL: CertifyEdge provision required in release mode"
            exit 1
          fi
          if [ -x .tools/certifyedge/certifyedge ]; then
            echo "PF_CORE_CERTIFYEDGE_CLI=${PWD}/.tools/certifyedge/certifyedge" >> "$GITHUB_ENV"
          fi
      - name: Install Python package
        run: |
          cd python
          pip install -c requirements.lock -e ".[dev,quality]"
          pcs capabilities
      - name: Quality - Ruff + Pyright + pytest + coverage threshold
        run: |
          cd python
          ruff check pcs_core tests
          ruff format --check pcs_core tests
          pyright pcs_core/external_attestation.py pcs_core/safe_paths.py pcs_core/pf_core_certifyedge.py
          coverage run -m pytest -q
          coverage report --include='pcs_core/external_attestation.py,pcs_core/pf_core_bundle.py,pcs_core/pf_core_certifyedge.py,pcs_core/safe_paths.py,pcs_core/hash.py' --fail-under=70
      - name: Technical gates - schemas, catalogs, release chains, vectors
        run: |
          cd python
          pcs schema check
          pcs pf-core audit-claims
          pcs pf-core audit-boundary
          pcs pf-core audit-lean-catalog
          pcs pf-core audit-lean-no-sorry
          pcs examples check
          pcs validate-release-chain ../examples/labtrust-release/
          pcs validate-release-chain ../examples/tool-use-release/
          pcs validate-release-chain ../examples/computation-release/
          pcs conformance run --suite all
          python -m pcs_core.hash_vectors --verify
          pcs shared-hash-vectors verify
          python scripts/gen_pf_core_catalog.py
          git diff --exit-code \
            ../python/pcs_core/pf_core_catalog.py \
            ../lean/PFCore/Catalog.lean \
            ../rust/crates/pcs-core/src/pf_core_catalog.rs \
            ../typescript/packages/core/src/pfCoreCatalog.ts
      - name: Rust quality gate
        run: |
          cd rust
          cargo fmt --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked
      - name: TypeScript quality gate
        run: |
          cd typescript
          npm ci
          npm run lint
          npm test
      - name: Lean kernels + proof binding
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          cd lean
          lake build PCS
          lake build PFCore
          cd ../python
          pcs pf-core lean-check \
            --trace ../examples/pf-core-valid/tool_use_trace_compiled/pfcore_trace.json \
            --out /tmp/pfcore-release-cert.json
          pcs pf-core verify-proof-binding \
            --certificate /tmp/pfcore-release-cert.json \
            --trace ../examples/pf-core-valid/tool_use_trace_compiled/pfcore_trace.json
          pcs conformance run --suite pf-core --release-grade
      - name: SBOM scaffold
        run: |
          bash scripts/generate-sbom.sh dist/sbom
          test -f dist/sbom/pcs-core.cdx.json
      - name: Assemble bundle + external attestation gate
        env:
          PF_CORE_CERTIFYEDGE_CLI: ${{ secrets.PF_CORE_CERTIFYEDGE_CLI }}
        run: |
          cd python
          mkdir -p ../dist/release-bundle
          pcs pf-core bundle-release \
            --trace ../examples/pf-core-valid/tool_use_trace_compiled/pfcore_trace.json \
            --cert /tmp/pfcore-release-cert.json \
            --out ../dist/release-bundle
          pcs pf-core validate-bundle ../dist/release-bundle
          if [ "${PCS_RELEASE_MODE}" = "release" ]; then
            if [ -z "${PF_CORE_CERTIFYEDGE_CLI:-}" ] || [ ! -f "${PF_CORE_CERTIFYEDGE_CLI}" ]; then
              if command -v certifyedge >/dev/null 2>&1; then
                export PF_CORE_CERTIFYEDGE_CLI="$(command -v certifyedge)"
              fi
            fi
            export PF_CORE_CERTIFYEDGE_MODE=live
            export PF_CORE_CERTIFYEDGE_REQUIRE_LIVE=1
            pcs pf-core attest-bundle \
              --bundle ../dist/release-bundle \
              --property qc_release.temporal.safety \
              --require-live
            pcs pf-core validate-external-attestation \
              --bundle ../dist/release-bundle \
              --require-live
          else
            pcs pf-core attest-bundle \
              --bundle ../dist/release-bundle \
              --property qc_release.temporal.safety \
              --allow-absence || true
            pcs pf-core validate-external-attestation \
              --bundle ../dist/release-bundle \
              --allow-absence
            if [ -f ../dist/release-bundle/ABSENCE_OF_EXTERNAL_ATTESTATION.json ]; then
              echo "TECHNICAL PREVIEW: external attestation absent (explicit notice present)"
            fi
          fi
          pcs pf-core validate-bundle ../dist/release-bundle
      - name: Signed tag policy (document; do not push)
        run: |
          echo "Create an annotated GPG/SSH-signed tag matching VERSION after gates pass."
          echo "This workflow does not create or push tags."
      - name: Upload local release artifacts (dry-run assembly)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pcs-core-release-bundle-${{ env.PCS_RELEASE_MODE }}
          path: |
            dist/release-bundle/
            dist/sbom/
          retention-days: 30
